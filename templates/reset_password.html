{% extends "layout.html" %}

{% block title %}Reset password{% endblock %}

{% block main %}
    <div class="container-fluid bg-minty min-vh-100">

        <!-- Outer Row -->
        <div class="row justify-content-center">

            <div class="col-xl-10 col-lg-12 col-md-9">

                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <!-- Nested Row within Card Body -->
                        <div class="row">
                            <div class="col-lg-6 d-none d-lg-block bg-login-image"><img src="/static/img/img5_final_project.jpg" id="img"></div>
                            <div class="col-lg-6">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 class="h4 text-gray-900 mb-4">Reset Password!</h1>
                                    </div>
                                    <form class="user" action="{{ url_for('reset_password', token=token) }}" method="post">
                                        <div class="form-group">
                                            <input type="password" name="new_password" class="form-control form-control-user"
                                                placeholder="New password" autofocus>
                                        </div>
                                        <div class="form-group">
                                            <input type="password" name="confirmation" class="form-control form-control-user" placeholder="Confirmation">
                                        </div>
                                        <button type="submit" class="btn btn-primary btn-user btn-block">Reset</button>
                                    </form>
                                    <hr>
                                    <div class="text-center">
                                        <a class="small" href="/register">Create an Account!</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>
{% endblock %}

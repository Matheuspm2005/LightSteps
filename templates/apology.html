{% extends "layout.html" %}

{% block title %}Error{% endblock %}

{% block main %}
    
    <div class="container-fluid">

          <!--Error Text -->
            <div class="text-center">
                <!--Code of the error-->
                <div class="error mx-auto" data-text="404">{{ top }}</div>
                    <!--what error-->
                    <p class="lead text-gray-800 mb-5">{{ bottom }}</p>
                    <!--specifies the error-->
                    <p class="text-gray-500 mb-0">{{ type }}</p>
                    <a href="{{ back }}">&larr; {{ back }}</a>
                </div>
            </div>
    </div>
{% endblock %}

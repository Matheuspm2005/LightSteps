{% extends "layout.html" %}

{% block title %}Login{% endblock %}

{% block main %}
    <div class="container-fluid bg-minty min-vh-100">

        <!-- Outer Row -->
        <div class="row justify-content-center">

            <div class="col-xl-10 col-lg-12 col-md-9">

                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <!-- Nested Row within Card Body -->
                        <div class="row">
                            <div class="col-lg-6 d-none d-lg-block bg-login-image"><img src="/static/img/img1_final_project.jpg" id="img"></div>
                            <div class="col-lg-6">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 class="h4 text-gray-900 mb-4">Welcome Back!</h1>
                                    </div>
                                    <form class="user" action="/login" method="post">
                                        <div class="form-group">
                                            <input type="text" name="identifier" class="form-control form-control-user"
                                                id="exampleInputEmail"
                                                placeholder="Email or Username" autofocus>
                                        </div>
                                        <div class="form-group">
                                            <input type="password" name="password" class="form-control form-control-user" placeholder="Password">
                                        </div>
                                        <div class="form-group">
                                            <div class="custom-control custom-checkbox small">
                                                <input type="checkbox" class="custom-control-input" id="customCheck" name="remember">
                                                <label class="custom-control-label text-gray-700" for="customCheck">Remember Me</label>
                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-primary btn-user btn-block">Login</button>
                                    </form>
                                    <hr>
                                    <div class="text-center">
                                        <a class="small" href="/forgot_password">Forgot Password?</a>
                                    </div>
                                    <div class="text-center">
                                        <a class="small" href="/register">Create an Account!</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>
    <script>
        function swap() {
            const images = ["/static/img/img1_final_project.jpg", "/static/img/img2_final_project.jpg", "/static/img/img3_final_project.jpg"];
            let image = 0;
            setInterval(function() {
                document.getElementById("img").src = images[image];
                image = (image + 1) % images.length;
            }, 2000);
            

        }
        swap();
    </script>
{% endblock %}
